<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Meu Bolão 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/3.5.0/css/flag-icon.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 120px; }
        .btn-menu { font-size: 30px; cursor: pointer; padding: 15px; color: #1a5e20; position: fixed; top: 0; left: 0; z-index: 100; }
        #menu-lateral { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #1a5e20; overflow-x: hidden; transition: 0.3s; padding-top: 60px; z-index: 200; }
        #menu-lateral a { padding: 15px 20px; text-decoration: none; font-size: 18px; color: white; display: block; cursor: pointer; }
        #menu-lateral a:hover { background: #114015; }
        .container { max-width: 600px; margin: auto; padding: 60px 20px 20px 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .pagination { text-align: center; padding: 15px; background: #fff; border-top: 2px solid #ddd; position: fixed; bottom: 0; width: 100%; left: 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; z-index: 50; }
        .pagination a { padding: 5px 8px; color: #1a5e20; font-weight: bold; text-decoration: none; cursor: pointer; font-size: 13px; border: 1px solid #1a5e20; border-radius: 4px; }
        .match-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-box { display: flex; align-items: center; width: 120px; font-size: 0.9em; font-weight: bold; }
        .flag-icon { margin-right: 8px; font-size: 1.2em; }
        .score-input { width: 40px; text-align: center; font-size: 1.2em; border: 1px solid #ccc; border-radius: 4px; }
        .btn-save { width: 100%; padding: 15px; background: #1a5e20; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>

        <a onclick="mostrar(7)">Semi-final</a><a onclick="mostrar(8)">Final</a><a onclick="mostrar(9)">Ranking</a>
    </div>

    <div class="container">

        window.abrirMenu = () => document.getElementById("menu-lateral").style.width = "250px";

        };

        function renderizar(lista, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            lista.forEach(j => {
                container.innerHTML += `
                    <div class="match-card">
                        <div class="team-box"><span class="flag-icon flag-icon-${j.codA}"></span>${j.timeA}</div>

            });
        }
        renderizar(jogosR1, 'lista-r1');
        renderizar(jogosR2, 'lista-r2');

</body>
</html>
